# Server configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/document_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
